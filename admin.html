<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Hindi Sub Studio</title>
    <style>
        body { font-family: Arial; background: #111; color: white; padding: 20px; margin: 0; }
        #adminPanel { max-width: 800px; margin: auto;}
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;}
        .tab-btn { background: #333; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-right: 5px; border-radius: 5px; font-weight: bold;}
        .tab-btn.active { background: #e50914; }
        .panel { display: none; background: #222; padding: 20px; margin-top: 15px; border-radius: 8px; border: 1px solid #333;}
        .panel.active { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #333; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box;}
        button.action-btn { background: #e50914; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 5px; width: 100%; font-weight: bold; margin-top: 10px; font-size: 15px;}
    </style>
</head>
<body>
    <div id="adminPanel">
        <div class="header-bar">
            <h2 style="color:white; margin: 0;">Hindi Sub <span style="color:#e50914;">Admin</span></h2>
        </div>
        
        <div>
            <button class="tab-btn active" onclick="switchTab('addPost')">Add Post</button>
            <button class="tab-btn" onclick="switchTab('addEp')">Add Episode</button>
            <button class="tab-btn" onclick="switchTab('premium')">Premium Users</button>
            <button class="tab-btn" onclick="switchTab('manage')">Delete Data</button>
            <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
        </div>

        <div id="addPost" class="panel active">
            <h3 style="color:#e50914; margin-top: 0;">Create New Post</h3>
            <input type="text" id="pId" placeholder="Post ID (e.g., naruto-01)">
            <input type="text" id="pName" placeholder="Post Name">
            <input type="text" id="pCat" placeholder="Category (Hindi Sub, Movie)">
            <input type="text" id="pGenre" placeholder="Genre">
            <input type="text" id="pImage" placeholder="Image URL">
            <textarea id="pStory" rows="3" placeholder="Story Summary..."></textarea>
            <button class="action-btn" onclick="sendReq({action:'adminAddPost', id:v('pId'), name:v('pName'), category:v('pCat'), genre:v('pGenre'), story:v('pStory'), image:v('pImage')})">Save Post</button>
        </div>

        <div id="addEp" class="panel">
            <h3 style="color:#e50914; margin-top: 0;">Add Episode</h3>
            <input type="text" id="eEpId" placeholder="Episode ID (e.g., naruto-ep1)">
            <input type="text" id="ePostId" placeholder="Post ID (e.g., naruto-01)">
            <input type="number" id="eNum" placeholder="Episode Number">
            <input type="text" id="eLive" placeholder="Live Video Link">
            <input type="text" id="eDl" placeholder="Direct Download Link">
            <button class="action-btn" onclick="sendReq({action:'adminAddEp', epId:v('eEpId'), postId:v('ePostId'), epNum:v('eNum'), liveLink:v('eLive'), dlLink:v('eDl')})">Save Episode</button>
        </div>

        <div id="premium" class="panel">
            <h3 style="color:#e50914; margin-top: 0;">Manage Premium Users</h3>
            <input type="email" id="uEmail" placeholder="User's Email">
            <input type="text" id="uPass" placeholder="Create Unique Password">
            <button class="action-btn" style="background:green;" onclick="sendReq({action:'adminAddUser', email:v('uEmail'), password:v('uPass')})">Grant Premium</button>
            <button class="action-btn" style="background:red;" onclick="if(confirm('Ban user?')) sendReq({action:'adminBanUser', email:v('uEmail')})">Ban User</button>
        </div>

        <div id="manage" class="panel">
            <h3 style="color:#e50914; margin-top: 0;">Delete Post</h3>
            <input type="text" id="delPId" placeholder="Enter Post ID to Delete (e.g., naruto-01)">
            <button class="action-btn" onclick="if(confirm('Delete Post?')) sendReq({action:'adminDeletePost', id:v('delPId')})">Delete Post</button>
        </div>

        <div id="settings" class="panel">
            <h3 style="color:#e50914; margin-top: 0;">Shortener Settings</h3>
            <input type="text" id="s1url" placeholder="API URL (e.g., https://shrinkearn.com/api)">
            <input type="text" id="s1key" placeholder="API KEY">
            <button class="action-btn" onclick="sendReq({action:'adminSaveSettings', s1url:v('s1url'), s1key:v('s1key')})">Save Settings</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUCRslJC40DWXNMAPI9Xa_nS0CpNngA8PW2t10hTz4y_WCdO_ZFeu0wzSeJGOIp4BFdA/exec";
        function v(id) { return document.getElementById(id).value; }
        
        function switchTab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        async function sendReq(payload) {
            alert("Processing... wait 2 seconds.");
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                let data = await res.json();
                alert(data.message);
                document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            } catch(e) { alert("Network Error!"); }
        }
    </script>
</body>
</html>
