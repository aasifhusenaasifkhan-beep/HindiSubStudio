<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Hindi Sub Studio</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 20px; margin: 0; }
        #adminPanel { max-width: 800px; margin: auto;}
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;}
        .tab-btn { background: #333; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-right: 5px; border-radius: 5px; font-weight: bold;}
        .tab-btn.active { background: #e50914; }
        .panel { display: none; background: #1a1a20; padding: 25px; margin-top: 15px; border-radius: 10px; border: 1px solid #444;}
        .panel.active { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; outline:none;}
        input:focus, textarea:focus { border-color: #e50914; }
        button.action-btn { background: #e50914; color: white; padding: 15px; border: none; cursor: pointer; border-radius: 5px; width: 100%; font-weight: bold; margin-top: 10px; font-size: 16px;}
    </style>
</head>
<body>
    <div id="adminPanel">
        <div class="header-bar">
            <h2 style="color:white; margin: 0;">Hindi Sub <span style="color:#e50914;">Admin Server</span></h2>
            <a href="index.html" style="color:#00d2ff;">Go to Website</a>
        </div>
        
        <div>
            <button class="tab-btn active" onclick="switchTab('addPost')">📝 Add Post</button>
            <button class="tab-btn" onclick="switchTab('addEp')">▶️ Add Episode</button>
            <button class="tab-btn" onclick="switchTab('premium')">👑 Premium Users</button>
            <button class="tab-btn" onclick="switchTab('manage')">🗑️ Delete Data</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
        </div>

        <div id="addPost" class="panel active">
            <h3 style="color:#e50914;">Upload New Movie/Anime</h3>
            <input type="text" id="pId" placeholder="Unique Post ID (e.g. naruto-01)">
            <input type="text" id="pName" placeholder="Post Name (e.g. Naruto)">
            <input type="text" id="pCat" placeholder="Category (Hindi Sub, Donghua, Movie)">
            <input type="text" id="pGenre" placeholder="Genre (Action, Comedy)">
            <input type="text" id="pImage" placeholder="Image URL">
            <textarea id="pStory" rows="4" placeholder="Story Summary..."></textarea>
            <button class="action-btn" onclick="sendReq({action:'adminAddPost', id:v('pId'), name:v('pName'), category:v('pCat'), genre:v('pGenre'), story:v('pStory'), image:v('pImage')})">Publish Post</button>
        </div>

        <div id="addEp" class="panel">
            <h3 style="color:#e50914;">Upload Episode</h3>
            <input type="text" id="eEpId" placeholder="Unique Episode ID (e.g. naruto-ep1)">
            <input type="text" id="ePostId" placeholder="Post ID (e.g. naruto-01)">
            <input type="number" id="eNum" placeholder="Episode Number (e.g. 1)">
            <input type="text" id="eLive" placeholder="Live Iframe / Video Link">
            <input type="text" id="eDl" placeholder="Secret Download Link (Premium/Shortener only)">
            <button class="action-btn" onclick="sendReq({action:'adminAddEp', epId:v('eEpId'), postId:v('ePostId'), epNum:v('eNum'), liveLink:v('eLive'), dlLink:v('eDl')})">Publish Episode</button>
        </div>

        <div id="premium" class="panel">
            <h3 style="color:#e50914;">Premium Access Control</h3>
            <input type="email" id="uEmail" placeholder="User's Email">
            <input type="text" id="uPass" placeholder="Assign Custom Password">
            <button class="action-btn" style="background:#28a745;" onclick="sendReq({action:'adminAddUser', email:v('uEmail'), password:v('uPass')})">Grant 28 Days Premium</button>
            <hr style="border-color:#333; margin:20px 0;">
            <button class="action-btn" style="background:#dc3545;" onclick="if(confirm('Are you sure?')) sendReq({action:'adminBanUser', email:v('uEmail')})">Ban User</button>
        </div>

        <div id="manage" class="panel">
            <h3 style="color:#e50914;">Delete Content</h3>
            <input type="text" id="delPId" placeholder="Enter Post ID to Delete (e.g. naruto-01)">
            <button class="action-btn" style="background:#dc3545;" onclick="if(confirm('Delete Post permanently?')) sendReq({action:'adminDeletePost', id:v('delPId')})">Delete Post</button>
        </div>

        <div id="settings" class="panel">
            <h3 style="color:#e50914;">Shortener API Setup (3 Accounts)</h3>
            <p style="color:gray; font-size:12px;">System will randomly rotate between these APIs.</p>
            <div style="display:flex; gap:10px;"><input type="text" id="s1url" placeholder="API 1 URL"><input type="text" id="s1key" placeholder="API 1 KEY"></div>
            <div style="display:flex; gap:10px;"><input type="text" id="s2url" placeholder="API 2 URL"><input type="text" id="s2key" placeholder="API 2 KEY"></div>
            <div style="display:flex; gap:10px;"><input type="text" id="s3url" placeholder="API 3 URL"><input type="text" id="s3key" placeholder="API 3 KEY"></div>
            <button class="action-btn" onclick="sendReq({action:'adminSaveSettings', s1url:v('s1url'), s1key:v('s1key'), s2url:v('s2url'), s2key:v('s2key'), s3url:v('s3url'), s3key:v('s3key')})">Save All Shorteners</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUCRslJC40DWXNMAPI9Xa_nS0CpNngA8PW2t10hTz4y_WCdO_ZFeu0wzSeJGOIp4BFdA/exec";
        function v(id) { return document.getElementById(id).value; }
        
        function switchTab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        async function sendReq(payload) {
            alert("Contacting Server...");
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                let data = await res.json();
                alert(data.message);
                document.querySelectorAll('input:not(#s1url):not(#s1key):not(#s2url):not(#s2key):not(#s3url):not(#s3key), textarea').forEach(el => el.value = '');
            } catch(e) { alert("Server Error!"); }
        }
    </script>
</body>
</html>
