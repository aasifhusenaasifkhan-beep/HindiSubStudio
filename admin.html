<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Hindi Sub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; }
        .admin-wrap { max-width: 800px; margin: auto; }
        .panel { display: none; background: rgba(20,20,25,0.9); padding: 25px; margin-top: 15px; border-radius: 10px; border: 1px solid #444;}
        .panel.active { display: block; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: white; border: 1px solid #333; border-radius: 5px; outline:none;}
        input:focus { border-color: var(--primary); }
        .tab-btn { background: #333; color: white; padding: 10px 15px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; margin-right:5px;}
        .tab-btn.active { background: var(--primary); }
    </style>
</head>
<body>
    <div class="stars"></div>

    <div id="loginScreen" class="modal-overlay" style="display:flex;">
        <div class="modal-box">
            <h2 style="color:#e50914; margin-bottom:10px;">Admin Lock</h2>
            <p style="font-size:12px; color:gray; margin-bottom:15px;">Leave blank if starting first time.</p>
            <input type="password" id="adminPass" placeholder="Enter Admin Password">
            <button class="btn-action" onclick="loginAdmin()">Login</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-wrap" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:15px; margin-bottom:20px;">
            <h2 style="color:white; margin:0;">Server <span style="color:#e50914;">Admin</span></h2>
            <a href="index.html" style="color:#00d2ff; text-decoration:none; font-weight:bold;">Go to Site</a>
        </div>
        
        <div style="display:flex; overflow-x:auto; padding-bottom:10px;">
            <button class="tab-btn active" onclick="switchTab('addPost')">📝 Post</button>
            <button class="tab-btn" onclick="switchTab('addEp')">▶️ Episode</button>
            <button class="tab-btn" onclick="switchTab('premium')">👑 Users</button>
            <button class="tab-btn" onclick="switchTab('manage')">🗑️ Delete</button>
            <button class="tab-btn" onclick="switchTab('settings')">⚙️ Settings</button>
        </div>

        <div id="addPost" class="panel active">
            <h3 style="color:#e50914;">1. Upload Movie/Anime</h3>
            <input type="text" id="pName" placeholder="Post Name (e.g. Naruto)">
            <input type="text" id="pCat" placeholder="Category (Anime, Movie...)">
            <input type="text" id="pGenre" placeholder="Genre">
            <input type="text" id="pDate" placeholder="Release Date / Year">
            <div style="background:#111; padding:15px; border-radius:5px; border:1px solid #333; margin:10px 0;">
                <label style="color:#ffc107; font-size:14px;">Mobile Image Upload:</label><br>
                <input type="file" id="postImageFile" accept="image/*" style="margin-bottom:0;">
                <p style="text-align:center; color:#555; margin:5px 0;">-- OR --</p>
                <input type="text" id="pImage" placeholder="Paste Direct Image URL">
            </div>
            <textarea id="pStory" rows="3" placeholder="Story/Description..."></textarea>
            <button class="btn-action" id="savePostBtn" onclick="addPost()">Publish Post</button>
        </div>

        <div id="addEp" class="panel">
            <h3 style="color:#e50914;">2. Upload Episode</h3>
            <label style="color:#aaa; font-size:14px;">Select Post:</label>
            <select id="epPostSelect"><option>Loading...</option></select>
            <input type="number" id="eNum" placeholder="Episode Number (e.g. 1)">
            <input type="text" id="eLive" placeholder="Live Iframe / Video Link">
            <input type="text" id="eDl" placeholder="Secret Download Link">
            <button class="btn-action" onclick="sendReq({action:'adminAddEp', postId:v('epPostSelect'), epNum:v('eNum'), liveLink:v('eLive'), dlLink:v('eDl')})">Publish Episode</button>
        </div>

        <div id="premium" class="panel">
            <h3 style="color:#e50914;">3. Manage Premium Access</h3>
            <input type="email" id="uEmail" placeholder="User's Email">
            <input type="text" id="uPass" placeholder="Assign Custom Password">
            <button class="btn-action" style="background:#28a745; border:none;" onclick="sendReq({action:'adminAddUser', email:v('uEmail'), password:v('uPass')})">Grant 28 Days Premium</button>
            <button class="btn-action" style="background:#dc3545; border:none;" onclick="if(confirm('Ban user?')) sendReq({action:'adminBanUser', email:v('uEmail')})">Ban User</button>
        </div>

        <div id="manage" class="panel">
            <h3 style="color:#e50914;">4. Delete System</h3>
            <label style="color:#aaa; font-size:14px;">Delete Entire Post:</label>
            <select id="delPostList"><option>Loading...</option></select>
            <button class="btn-action" style="background:#dc3545; border:none;" onclick="if(confirm('Delete Full Post?')) sendReq({action:'adminDeletePost', id:v('delPostList')})">Delete Full Post</button>
            <hr style="border-color:#333; margin:20px 0;">
            <label style="color:#aaa; font-size:14px;">Delete Specific Episode:</label>
            <select id="delEpPostList" onchange="loadEpisodesForDelete()"><option>Select Post First...</option></select>
            <select id="delEpList"><option>Select Episode...</option></select>
            <button class="btn-action" style="background:#ff4500; border:none;" onclick="if(confirm('Delete only this episode?')) sendReq({action:'adminDeleteEp', epId:v('delEpList')})">Delete Episode</button>
        </div>

        <div id="settings" class="panel">
            <h3 style="color:#e50914;">5. Configuration</h3>
            <label style="color:#ffc107; font-size:14px;">Admin Panel Lock Password:</label>
            <input type="text" id="aPass" placeholder="Set password to lock this page">
            <label style="color:#ffc107; font-size:14px; margin-top:10px; display:block;">Global Video Player Password:</label>
            <input type="text" id="vPass" placeholder="Leave blank for open streaming">
            <hr style="border-color:#333; margin:15px 0;">
            <label style="color:#ffc107; font-size:14px;">Shortener APIs (Leave blank to disable one):</label>
            <div style="display:flex; gap:10px;"><input type="text" id="s1url" placeholder="URL 1"><input type="text" id="s1key" placeholder="KEY 1"></div>
            <div style="display:flex; gap:10px;"><input type="text" id="s2url" placeholder="URL 2"><input type="text" id="s2key" placeholder="KEY 2"></div>
            <div style="display:flex; gap:10px;"><input type="text" id="s3url" placeholder="URL 3"><input type="text" id="s3key" placeholder="KEY 3"></div>
            <button class="btn-action" onclick="sendReq({action:'adminSaveSettings', s1url:v('s1url'), s1key:v('s1key'), s2url:v('s2url'), s2key:v('s2key'), s3url:v('s3url'), s3key:v('s3key'), videoPass:v('vPass'), adminPass:v('aPass')})">Save All Settings</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzkSDeNISJyEJJRJH54mLPGYCKyC4CrsJMnyYFBuLGiQflPD-LgvzOX_kUgBd9h8B4/exec";
        function v(id) { return document.getElementById(id).value; }
        let allAdminEps = [];

        async function loginAdmin() {
            let pass = document.getElementById("adminPass").value;
            let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "adminLogin", pass: pass }) });
            if((await res.json()).status === "success") {
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("adminPanel").style.display = "block";
                loadAllAdminData();
            } else alert("❌ Wrong Password!"); 
        }

        function switchTab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadAllAdminData() {
            let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getAllAdminData" }) });
            let json = await res.json();
            allAdminEps = json.episodes;
            let html = "<option value=''>Select Post...</option>"; 
            json.posts.forEach(p => html += `<option value="${p.id}">${p.name}</option>`);
            document.getElementById("epPostSelect").innerHTML = html;
            document.getElementById("delPostList").innerHTML = html;
            document.getElementById("delEpPostList").innerHTML = html;
        }

        function loadEpisodesForDelete() {
            let sel = v("delEpPostList"), html = "";
            allAdminEps.filter(e => e.postId === sel).forEach(e => html += `<option value="${e.epId}">Episode ${e.epNum}</option>`);
            document.getElementById("delEpList").innerHTML = html || "<option>No episodes</option>";
        }

        async function addPost() {
            let file = document.getElementById("postImageFile").files[0], urlInput = v("pImage"), pName = v("pName"), btn = document.getElementById("savePostBtn");
            if(!pName) return alert("Enter Post Name!");
            if(!file && !urlInput) return alert("Upload image or paste URL!");
            
            btn.innerHTML = "Uploading..."; btn.disabled = true;
            try {
                let finalImgUrl = urlInput;
                if(file) {
                    const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", "asi_anime_upload"); 
                    let r = await fetch("https://api.cloudinary.com/v1_1/dccbzyjtr/image/upload", { method: "POST", body: fd });
                    finalImgUrl = (await r.json()).secure_url; 
                }
                await sendReq({ action: "adminAddPost", name: pName, category: v('pCat'), genre: v('pGenre'), releaseDate: v('pDate'), story: v('pStory'), image: finalImgUrl });
            } catch(e) { alert("Upload Failed."); }
            btn.innerHTML = "Publish Post"; btn.disabled = false;
        }

        async function sendReq(payload) {
            alert("Contacting Server...");
            let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert((await res.json()).message);
            if(payload.action !== 'adminSaveSettings') {
                document.querySelectorAll('input:not(#adminPass):not([type="file"]), textarea').forEach(el => el.value = '');
                loadAllAdminData(); 
            }
        }
    </script>
</body>
</html>
