<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch Video | Hindi Sub Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Hindi Sub <span>Studio</span></a>
        <button onclick="history.back()" style="background:#333; color:white; padding:5px 15px; border:none; border-radius:5px; cursor:pointer;">Go Back</button>
    </header>

    <div class="watch-container">
        <div class="video-wrapper" id="vidPlayer">
            <iframe id="liveFrame" src="" allowfullscreen></iframe>
        </div>
        <button class="btn-action" style="background:#333;" onclick="document.getElementById('vidPlayer').classList.toggle('zoomed')">🔍 Zoom In/Out</button>
        
        <div style="margin-top: 30px;">
            <button class="btn-action" style="background: linear-gradient(45deg, #FFD700, #FFA500); color: black;" onclick="document.getElementById('premModal').style.display='block'">👑 Premium Download</button>
            <button class="btn-action" style="background: #0088cc;" id="shortBtn" onclick="generateShortLink(this)">⬇️ Solve Shortener to Download</button>
        </div>
        <a href="https://t.me/hindisubinganime" target="_blank" style="display:block; color: #0088cc; text-decoration:none; margin-top:15px;">👉 Join Telegram for Updates</a>
    </div>

    <!-- Premium Modal -->
    <div id="premModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; text-align:center; padding-top:10%;">
        <div style="background:#16161a; width:90%; max-width:400px; margin:auto; padding:20px; border-radius:10px; border: 2px solid #e50914;">
            <h3 style="color:#FFD700;">Premium Login</h3>
            <p style="font-size: 12px; color: gray; margin-bottom:15px;">Valid for 28 Days.</p>
            <input type="email" id="uEmail" placeholder="Your Email" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; background:#222; color:white; border:none; outline:none;">
            <input type="password" id="uPass" placeholder="Your Password" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; background:#222; color:white; border:none; outline:none;">
            <button id="verifyBtn" onclick="verifyPremium()" style="background:#e50914; color:white; padding:10px; width:100%; border:none; cursor:pointer; font-weight:bold; border-radius:5px;">Unlock High-Speed Link</button>
            <button onclick="document.getElementById('premModal').style.display='none'" style="background:transparent; color:#aaa; margin-top:10px; border:none; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUCRslJC40DWXNMAPI9Xa_nS0CpNngA8PW2t10hTz4y_WCdO_ZFeu0wzSeJGOIp4BFdA/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const epId = urlParams.get('epid');
        document.getElementById("liveFrame").src = decodeURIComponent(urlParams.get('live'));

        async function verifyPremium() {
            let email = document.getElementById("uEmail").value;
            let pass = document.getElementById("uPass").value;
            let btn = document.getElementById("verifyBtn");
            if(!email || !pass) return alert("Email aur Password daalein!");
            
            btn.innerHTML = "Checking...";
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "verifyPremium", email: email, password: pass, epId: epId }) });
                let json = await res.json();
                if(json.status === "error") alert(json.message);
                else { alert("✅ Access Granted!"); window.location.href = json.dlLink; }
            } catch(e) { alert("Server Error"); }
            btn.innerHTML = "Unlock High-Speed Link";
        }

        async function generateShortLink(btn) {
            btn.innerHTML = "Generating Link Please Wait...";
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getShortLink", epId: epId }) });
                let json = await res.json();
                if(json.status === "error") alert(json.message);
                else {
                    const form = document.createElement('form');
                    form.method = "GET"; form.action = json.shortLink; form.target = "_blank";
                    document.body.appendChild(form); form.submit(); document.body.removeChild(form);
                }
            } catch(e) { alert("Link Generation Failed."); }
            btn.innerHTML = "⬇️ Solve Shortener to Download";
        }
    </script>
</body>
</html>
