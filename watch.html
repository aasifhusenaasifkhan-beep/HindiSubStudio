<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Download | Hindi Sub Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <header>
        <a href="index.html" class="logo">Hindi Sub <span>Studio</span></a>
        <button onclick="history.back()" style="background:#333; color:white; padding:5px 15px; border:none; border-radius:5px; cursor:pointer;">Back</button>
    </header>

    <!-- Global Video Password Lock -->
    <div id="videoLockOverlay" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color:#e50914; margin-bottom:15px;">🔒 Video Locked</h2>
            <p style="font-size:12px; color:gray; margin-bottom:15px;">Join Telegram to get the free password.</p>
            <input type="text" id="globalPassInput" placeholder="Enter Video Password">
            <button class="btn-action" onclick="checkVideoPassword()">Unlock Video</button>
            <a href="https://t.me/hindisubinganime" target="_blank" style="display:block; color:#00d2ff; text-decoration:none; margin-top:20px; font-weight:bold;">👉 Click Here for Password</a>
        </div>
    </div>

    <!-- Main Player Box -->
    <div class="watch-container" id="watchBox" style="display:none;">
        <h2 style="margin-bottom:15px; color:#FFD700; text-align:left;">📺 Live Stream</h2>
        <div class="video-wrapper">
            <iframe id="liveFrame" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>
        
        <div style="margin-top: 30px; padding:20px; background:rgba(0,0,0,0.6); border-radius:10px; border:1px dashed #e50914;">
            <h3 style="color:white; margin-bottom:15px;">📥 Download Episode</h3>
            <button class="btn-action" style="background: #0088cc; border:none;" id="shortBtn" onclick="generateShortLink(this)">⬇️ Free User (Solve Shortener)</button>
            <button class="btn-action" style="background: linear-gradient(45deg, #FFD700, #FFA500); color: black; border:none;" onclick="document.getElementById('premModal').style.display='flex'">👑 Premium User (Direct Link)</button>
        </div>
        <a href="https://t.me/hindisubanime_q" target="_blank" style="display:block; color: #00d2ff; text-decoration:none; margin-top:20px; font-weight:bold;">💬 Join Support Group</a>
    </div>

    <!-- Premium Modal -->
    <div id="premModal" class="modal-overlay">
        <div class="modal-box" style="border-color:#FFD700;">
            <h2 style="color:#FFD700; margin-bottom:15px;">👑 Premium Access</h2>
            <input type="email" id="uEmail" placeholder="Your Email">
            <input type="password" id="uPass" placeholder="Your Password">
            <button id="verifyBtn" class="btn-action" style="background:linear-gradient(45deg, #FFD700, #FFA500); color:black;" onclick="verifyPremium()">Verify & Download</button>
            <button class="btn-action" style="background:#333; border:none;" onclick="document.getElementById('premModal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzkSDeNISJyEJJRJH54mLPGYCKyC4CrsJMnyYFBuLGiQflPD-LgvzOX_kUgBd9h8B4/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const epId = urlParams.get('epid');
        let correctVideoPass = "";

        async function initPage() {
            let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getInitialData" }) });
            correctVideoPass = (await res.json()).videoPass;
            
            if(!correctVideoPass || localStorage.getItem("vidPass") === correctVideoPass) unlockVideo(); 
            else document.getElementById("videoLockOverlay").style.display = "flex";
        }

        function checkVideoPassword() {
            if(document.getElementById("globalPassInput").value === correctVideoPass) {
                localStorage.setItem("vidPass", correctVideoPass); unlockVideo();
            } else alert("❌ Incorrect Password!");
        }

        function unlockVideo() {
            document.getElementById("videoLockOverlay").style.display = "none";
            document.getElementById("watchBox").style.display = "block";
            document.getElementById("liveFrame").src = decodeURIComponent(urlParams.get('live'));
        }

        async function verifyPremium() {
            let email = document.getElementById("uEmail").value, pass = document.getElementById("uPass").value, btn = document.getElementById("verifyBtn");
            if(!email || !pass) return alert("Enter Details!");
            btn.innerHTML = "Verifying...";
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "verifyPremium", email: email, password: pass, epId: epId }) });
                let json = await res.json();
                if(json.status === "error") alert(json.message);
                else { alert("✅ Success!"); window.location.href = json.dlLink; }
            } catch(e) {}
            btn.innerHTML = "Verify & Download";
        }

        async function generateShortLink(btn) {
            btn.innerHTML = "🔄 Generating Link...";
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getShortLink", epId: epId }) });
                let json = await res.json();
                if(json.status === "error") alert(json.message);
                else window.open(json.shortLink, "_blank");
            } catch(e) {}
            btn.innerHTML = "⬇️ Free User (Solve Shortener)";
        }
        initPage();
    </script>
</body>
</html>
