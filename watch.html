<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch & Download | Hindi Sub Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <header>
        <a href="index.html" class="logo">Hindi Sub <span>Studio</span></a>
        <button onclick="history.back()" class="ep-btn" style="background:#333; box-shadow:none;">Go Back</button>
    </header>

    <div class="watch-container">
        <!-- Live Video Block -->
        <h2 style="margin-bottom:15px; color:#FFD700;">📺 Live Stream</h2>
        <div class="video-wrapper" id="vidPlayer">
            <iframe id="liveFrame" src="" allowfullscreen></iframe>
        </div>
        
        <div style="margin-top: 30px; padding:20px; background:rgba(0,0,0,0.5); border-radius:10px; border:1px dashed #e50914;">
            <h3 style="color:white; margin-bottom:10px;">📥 Download Episode</h3>
            
            <button class="btn-action" style="background: #0088cc;" id="shortBtn" onclick="generateShortLink(this)">⬇️ Free User (Solve Shortener)</button>
            <br>
            <button class="btn-action" style="background: linear-gradient(45deg, #FFD700, #FFA500); color: black; margin-top:10px;" onclick="document.getElementById('premModal').style.display='block'">👑 Premium Users (Direct Fast Link)</button>
        </div>
    </div>

    <!-- Premium Modal -->
    <div id="premModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(5px); z-index:3000; text-align:center; padding-top:10%;">
        <div style="background:var(--glass-bg); width:90%; max-width:400px; margin:auto; padding:30px; border-radius:15px; border: 2px solid #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.3);">
            <h2 style="color:#FFD700; margin-bottom:10px;">👑 Premium Access</h2>
            <p style="font-size: 13px; color: #b3b8c2; margin-bottom:20px;">Download direct without ads.</p>
            <input type="email" id="uEmail" placeholder="Premium Email" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; background:#111; color:white; border:1px solid #444;">
            <input type="password" id="uPass" placeholder="Secret Password" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; background:#111; color:white; border:1px solid #444;">
            <button id="verifyBtn" onclick="verifyPremium()" style="background:linear-gradient(45deg, #FFD700, #FFA500); color:black; padding:12px; width:100%; border:none; cursor:pointer; font-weight:bold; font-size:16px; border-radius:8px;">Unlock Download Link</button>
            <button onclick="document.getElementById('premModal').style.display='none'" style="background:transparent; color:#aaa; margin-top:15px; border:none; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUCRslJC40DWXNMAPI9Xa_nS0CpNngA8PW2t10hTz4y_WCdO_ZFeu0wzSeJGOIp4BFdA/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const epId = urlParams.get('epid');
        
        // Load iframe correctly
        document.getElementById("liveFrame").src = decodeURIComponent(urlParams.get('live'));

        async function verifyPremium() {
            let email = document.getElementById("uEmail").value;
            let pass = document.getElementById("uPass").value;
            let btn = document.getElementById("verifyBtn");
            if(!email || !pass) return alert("Please enter Email & Password!");
            
            btn.innerHTML = "Verifying Security...";
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "verifyPremium", email: email, password: pass, epId: epId }) });
                let json = await res.json();
                if(json.status === "error") alert(json.message);
                else { alert("✅ Verification Success! Redirecting to Download..."); window.location.href = json.dlLink; }
            } catch(e) { alert("Server Error"); }
            btn.innerHTML = "Unlock Download Link";
        }

        async function generateShortLink(btn) {
            btn.innerHTML = "🔄 Generating Secure Link...";
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getShortLink", epId: epId }) });
                let json = await res.json();
                if(json.status === "error") alert(json.message);
                else window.open(json.shortLink, "_blank");
            } catch(e) { alert("Ad Network Error."); }
            btn.innerHTML = "⬇️ Free User (Solve Shortener)";
        }
    </script>
</body>
</html>
