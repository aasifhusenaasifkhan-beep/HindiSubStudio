<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details | Hindi Sub Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <header>
        <a href="index.html" class="logo">Hindi Sub <span>Studio</span></a>
        <a href="index.html" style="color:white; text-decoration:none; background:#333; padding:5px 15px; border-radius:5px;">Back</a>
    </header>

    <div id="detailBox" style="padding: 50px; color: white; text-align: center;">Fetching Data...</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzkSDeNISJyEJJRJH54mLPGYCKyC4CrsJMnyYFBuLGiQflPD-LgvzOX_kUgBd9h8B4/exec";
        const postId = new URLSearchParams(window.location.search).get('id');

        async function loadDetail() {
            try {
                let resP = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getInitialData" }) });
                let post = (await resP.json()).posts.find(p => p.id === postId);
                if(!post) return document.getElementById("detailBox").innerHTML = "Data Not Found";

                let resE = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getEpisodes", postId: postId }) });
                let episodes = (await resE.json()).data.sort((a,b) => parseFloat(a.epNum) - parseFloat(b.epNum));
                
                let epHtml = episodes.length ? "" : "<p style='color:red;'>No episodes available.</p>";
                episodes.forEach(ep => {
                    epHtml += `<a href="watch.html?epid=${ep.epId}&live=${encodeURIComponent(ep.liveLink)}" class="ep-btn">Episode ${ep.epNum}</a>`;
                });

                document.getElementById("detailBox").innerHTML = `
                    <div class="detail-container">
                        <img src="${post.image}" class="detail-poster">
                        
                        <div class="detail-info">
                            <h1>${post.name}</h1>
                            <p><span>Genre:</span> ${post.genre}</p>
                            <p><span>Release Date:</span> ${post.releaseDate || "N/A"}</p>
                            <div class="story-box">
                                <p><span>Story:</span><br>${post.story}</p>
                            </div>
                        </div>

                        <h3 style="color: #ff4500; margin-bottom: 15px;">Watch Episodes</h3>
                        <div class="ep-list">${epHtml}</div>
                    </div>`;
            } catch(e) { document.getElementById("detailBox").innerHTML = "Error loading."; }
        }
        loadDetail();
    </script>
</body>
</html>
