<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindi Sub Studio | Watch Free Anime, K-Drama & Series</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">Hindi Sub <span>Studio</span></a>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Series, Anime..." onkeyup="searchPosts()">
            <div class="dropdown">
                <button onclick="document.getElementById('dotMenu').classList.toggle('show')" class="dropbtn">⋮</button>
                <div id="dotMenu" class="dropdown-content">
                    <a href="javascript:void(0)" onclick="document.getElementById('azModal').style.display='block'"><i class="fas fa-sort-alpha-down"></i> A-Z List</a>
                    <a href="https://t.me/hindisubanime_q" target="_blank"><i class="fas fa-users"></i> Telegram Group</a>
                    <a href="https://t.me/hindisubinganime" target="_blank"><i class="fas fa-bullhorn"></i> Telegram Channel</a>
                </div>
            </div>
        </div>
    </header>

    <div id="azModal">
        <div class="az-modal-content">
            <span class="close-modal" onclick="document.getElementById('azModal').style.display='none'">&times;</span>
            <h3>Directory (A-Z & 0-9)</h3>
            <div id="azButtonsBox"></div>
        </div>
    </div>

    <div class="anime-grid" id="postGrid">
        <h2 style="text-align: center; width: 100%; color: #e50914;">Loading Content...</h2>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUCRslJC40DWXNMAPI9Xa_nS0CpNngA8PW2t10hTz4y_WCdO_ZFeu0wzSeJGOIp4BFdA/exec";
        let allPosts = [];

        window.onclick = function(e) {
            if (!e.target.matches('.dropbtn')) {
                document.querySelectorAll(".dropdown-content.show").forEach(d => d.classList.remove('show'));
            }
        }

        const azDiv = document.getElementById("azButtonsBox");
        azDiv.innerHTML += `<button class="az-btn" onclick="filterAZ('ALL')">All</button>`;
        "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
            azDiv.innerHTML += `<button class="az-btn" onclick="filterAZ('${l}')">${l}</button>`;
        });

        window.filterAZ = (letter) => {
            document.getElementById('azModal').style.display='none';
            if(letter === 'ALL') return displayPosts(allPosts);
            displayPosts(allPosts.filter(p => p.name.toUpperCase().startsWith(letter)));
        }

        async function loadPosts() {
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getPosts" }) });
                allPosts = (await res.json()).data;
                displayPosts(allPosts);
            } catch(e) { document.getElementById("postGrid").innerHTML = "<h3 style='color:white;text-align:center;'>Network Error.</h3>"; }
        }

        window.displayPosts = (data) => {
            const grid = document.getElementById("postGrid");
            grid.innerHTML = "";
            if(data.length === 0) return grid.innerHTML = "<h3 style='color:white;text-align:center;'>No content found.</h3>";
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="anime-card" onclick="window.location.href='detail.html?id=${p.id}'">
                        <div class="badge">${p.category}</div>
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                        <div class="anime-info"><h4>${p.name}</h4><span class="genre-tag">${p.genre}</span></div>
                    </div>`;
            });
        }

        window.searchPosts = () => {
            let val = document.getElementById("searchInput").value.toLowerCase();
            displayPosts(allPosts.filter(p => p.name.toLowerCase().includes(val) || p.category.toLowerCase().includes(val)));
        }
        loadPosts();
    </script>
</body>
</html>
