<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch Hindi Subbed Anime, Donghua, K-Drama, and Movies for free.">
    <meta name="keywords" content="Hindi Sub studio, Anime Hindi sub, Anime Hindi dub, Donghua Hindi sub, K drama, Movies, Series, Free streaming">
    <title>Hindi Sub Studio | Home of Anime & K-Drama</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="stars"></div> <!-- Animated Background -->
    
    <header>
        <a href="index.html" class="logo">Hindi Sub <span>Studio</span></a>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Anime, Movies..." onkeyup="searchPosts()">
            <div class="dropdown">
                <button onclick="document.getElementById('dotMenu').classList.toggle('show')" class="dropbtn">⋮</button>
                <div id="dotMenu" class="dropdown-content">
                    <a href="https://t.me/hindisubanime_q" target="_blank"><i class="fab fa-telegram"></i> Join Telegram Group</a>
                    <a href="https://t.me/hindisubinganime" target="_blank"><i class="fas fa-bullhorn"></i> Official Channel</a>
                </div>
            </div>
        </div>
    </header>

    <div class="anime-grid" id="postGrid">
        <h2 style="color: #e50914; text-align: center; width: 100%;">🚀 Loading Universe...</h2>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwUCRslJC40DWXNMAPI9Xa_nS0CpNngA8PW2t10hTz4y_WCdO_ZFeu0wzSeJGOIp4BFdA/exec";
        let allPosts = [];

        window.onclick = function(e) {
            if (!e.target.matches('.dropbtn')) {
                document.querySelectorAll(".dropdown-content.show").forEach(d => d.classList.remove('show'));
            }
        }

        async function loadPosts() {
            try {
                let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getPosts" }) });
                allPosts = (await res.json()).data;
                displayPosts(allPosts);
            } catch(e) { document.getElementById("postGrid").innerHTML = "<h3 style='color:white;text-align:center;'>Network Error. Refresh page.</h3>"; }
        }

        function displayPosts(data) {
            const grid = document.getElementById("postGrid");
            grid.innerHTML = "";
            if(data.length === 0) return grid.innerHTML = "<h3 style='color:white;width:100%;text-align:center;'>No Anime Found 😢</h3>";
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="anime-card" onclick="window.location.href='detail.html?id=${p.id}'">
                        <div class="badge">${p.category}</div>
                        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                        <div class="anime-info"><h4>${p.name}</h4><span class="genre-tag">${p.genre}</span></div>
                    </div>`;
            });
        }

        function searchPosts() {
            let val = document.getElementById("searchInput").value.toLowerCase();
            displayPosts(allPosts.filter(p => p.name.toLowerCase().includes(val) || p.category.toLowerCase().includes(val) || p.genre.toLowerCase().includes(val)));
        }
        loadPosts();
    </script>
</body>
</html>
